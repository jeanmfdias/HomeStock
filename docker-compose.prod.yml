services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: homestock-app
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: "${APP_SECRET:?APP_SECRET is required}"
      DATABASE_URL: "sqlite:////app/var/data/data.db"
      TRUSTED_PROXIES: "127.0.0.1,REMOTE_ADDR"
    volumes:
      - homestock_data:/app/var/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "${HOMESTOCK_PORT:-8080}:80"

volumes:
  homestock_data:
