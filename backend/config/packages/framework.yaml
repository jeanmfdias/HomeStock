framework:
    secret: '%env(APP_SECRET)%'
    default_locale: pt_BR
    enabled_locales: ['pt_BR', 'en']
    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks: ['en']
    session:
        cookie_secure: auto
        cookie_samesite: lax
        handler_id: null
    csrf_protection:
        enabled: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
