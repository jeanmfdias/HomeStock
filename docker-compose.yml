services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: homestock-php
    working_dir: /app
    volumes:
      - ./backend:/app
      - homestock_data:/app/var/data
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "sqlite:////app/var/data/data.db"
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    container_name: homestock-nginx
    depends_on:
      - php
    volumes:
      - ./backend:/app:ro
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

  node:
    image: node:22-alpine
    container_name: homestock-node
    working_dir: /app
    depends_on:
      - nginx
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: "http://nginx"

volumes:
  homestock_data:
